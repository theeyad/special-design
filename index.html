<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Eyad">
    <meta name="keywords" content="HTML, CSS, JS, Design">
    <meta name="description" content="Special Design With HTML, CSS, JS">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/favIcon.svg" type="image/x-icon">
    <title>Special Design</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300..700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!-- Normallize CSS File -->
    <link rel="stylesheet" href="css/normallize.css">
    <!-- Custom CSS File -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Start Settings Box -->
    <div class="setting-box">
        <div class="toggle-setting">
            <i class="fa-solid fa-gear gear"></i>
        </div>
        <div class="options">
            <h4>colors</h4>
            <ul class="colors">
                <li class="active" data-color="#f00f70"></li>
                <li data-color="#F2B50B"></li>
                <li data-color="#9CD5FF"></li>
                <li data-color="#AEB784"></li>
                <li data-color="#91d06cbf"></li>
            </ul>
        </div>
    </div>
    <!-- End Settings Box -->

    <!-- Start Landing Section -->
    <section class="landing">
        <div class="overlay"></div>
        <header class="header">
            <div class="logo">
                <span class="agency-name">Special Design</span>
            </div>
            <ul class="navs">
                <a href="">
                    <li class="active">About</li>
                </a>
                <a href="">
                    <li>Services</li>
                </a>
                <a href="">
                    <li>Products</li>
                </a>
                <a href="">
                    <li>Contact</li>
                </a>
            </ul>
        </header>
        <div class="introduction-text">
            <h1>We Are <span class="agency-name colored">Special</span></h1>
            <p class="desc">All Your Favourites, One Place, Designed By You.</p>
        </div>
    </section>
    <!-- End Landing Section -->

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/bcf95508ed.js" crossorigin="anonymous"></script>
    <!-- Main JS File -->
    <script src="js/main.js"></script>
</body>

</html>
